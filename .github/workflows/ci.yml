name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: chopsticks-lean-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Syntax gate
        run: npm run ci:syntax

      - name: Migration gate
        run: npm run ci:migrations

      - name: Lean boot smoke
        env:
          CI_SKIP_DISCORD_LOGIN: "true"
          STORAGE_DRIVER: postgres
          DASHBOARD_ENABLED: "false"
          AGENTS_ENABLED: "false"
          MUSIC_ENABLED: "false"
          DISCORD_TOKEN: ci-skip-login
          CLIENT_ID: "000000000000000000"
          BOT_OWNER_IDS: "1"
          POSTGRES_URL: postgresql://chopsticks:changeme@127.0.0.1:5432/chopsticks
          DATABASE_URL: postgresql://chopsticks:changeme@127.0.0.1:5432/chopsticks
          REDIS_URL: redis://127.0.0.1:6379
          HEALTH_PORT: "-1"
          METRICS_PORT: "-1"
        run: node src/index.js
