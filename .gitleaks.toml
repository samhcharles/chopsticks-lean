# .gitleaks.toml
# Gitleaks configuration for Chopsticks.
# Run: gitleaks detect --config .gitleaks.toml --source .

title = "Chopsticks Gitleaks Config"

[extend]
useDefault = true   # Inherit all default gitleaks rules

# ── Global Allow-list (false positive exceptions) ──────────────────────────
[allowlist]
description = "Ignore test fixtures, documentation, and specific placeholders"
paths = [
  "test/fixtures/",
  ".env.example",
  "docs/",
  "scripts/voice-piper-models.md"
]
regexes = [
  "sk-YOUR[A-Z_]+HERE",
  "your[-_]api[-_]key",
  "INSERT[-_]TOKEN[-_]HERE",
  "<redacted>",
  "example\\.com",
  "youshallnotpass",
  "7C897F-20022D-E3EC39-74B5DF-A79E83-V3" # The Gitleaks license key itself
]

# ── Custom rules ─────────────────────────────────────────────────────────────

[[rules]]
description = "Discord Bot Token"
id = "discord-bot-token"
regex = '''(?i)discord[_-]?token\s*=\s*[A-Za-z0-9._-]{50,}'''
tags = ["discord", "token"]

[[rules]]
description = "Lavalink password in source"
id = "lavalink-password"
regex = '''(?i)lavalink[_-]?password\s*=\s*[^\s${"]{8,}'''
tags = ["lavalink", "auth"]

[[rules]]
description = "Agent token key"
id = "agent-token-key"
regex = '''(?i)agent[_-]?token[_-]?key\s*=\s*[0-9a-fA-F]{64}'''
tags = ["encryption-key"]
